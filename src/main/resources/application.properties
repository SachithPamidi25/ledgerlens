spring.application.name=ledgerlens
spring.config.import=optional:file:.env[.properties]
spring.docker.compose.enabled=false
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:30}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:10}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

jwt.expiration=900000
jwt.refresh-expiration=604800000
# Required. Generate with: openssl rand -hex 32
jwt.secret=${JWT_SECRET}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

logging.level.org.springframework.security=WARN

minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket=${MINIO_BUCKET:ledgerlens-receipts}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

rabbitmq.queue.receipt=receipt.processing
rabbitmq.exchange=ledgerlens.exchange
rabbitmq.routing-key=receipt.process
spring.rabbitmq.listener.simple.concurrency=${RABBITMQ_LISTENER_CONCURRENCY:3}
spring.rabbitmq.listener.simple.max-concurrency=${RABBITMQ_LISTENER_MAX_CONCURRENCY:10}
spring.rabbitmq.listener.simple.prefetch=${RABBITMQ_LISTENER_PREFETCH:5}
spring.rabbitmq.template.mandatory=true

# Set ANTHROPIC_API_KEY env var — receipt processing will fail without a real key
anthropic.api-key=${ANTHROPIC_API_KEY:not-configured}
anthropic.model=${ANTHROPIC_MODEL:claude-haiku-4-5}

storage.max-download-bytes=20971520

merchant.similarity-threshold=${MERCHANT_SIMILARITY_THRESHOLD:0.3}

spring.cache.type=redis
spring.cache.redis.time-to-live=86400000

management.endpoints.web.exposure.include=health,info,circuitbreakers,retries
management.endpoint.health.show-details=when-authorized

# ── Resilience4j: Circuit Breaker ────────────────────────────────────────────
# Opens after 50% failures in a 10-call sliding window.
# Waits 30s in OPEN before trying HALF-OPEN with 3 probe calls.
resilience4j.circuitbreaker.instances.claude.register-health-indicator=true
resilience4j.circuitbreaker.instances.claude.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.claude.sliding-window-size=10
resilience4j.circuitbreaker.instances.claude.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.claude.slow-call-rate-threshold=80
resilience4j.circuitbreaker.instances.claude.slow-call-duration-threshold=15s
resilience4j.circuitbreaker.instances.claude.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.claude.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.claude.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.claude.ignore-exceptions=com.ledgerlens.receipt.ClaudeNonRetryableException

# ── Resilience4j: Retry ──────────────────────────────────────────────────────
# 3 attempts, exponential backoff: 1s → 2s → 4s (capped at 10s).
# Only retries transient failures — non-retryable exceptions are excluded.
resilience4j.retry.instances.claude.max-attempts=3
resilience4j.retry.instances.claude.wait-duration=1s
resilience4j.retry.instances.claude.enable-exponential-backoff=true
resilience4j.retry.instances.claude.exponential-backoff-multiplier=2
resilience4j.retry.instances.claude.exponential-max-wait-duration=10s
resilience4j.retry.instances.claude.retry-exceptions=com.ledgerlens.receipt.ClaudeTransientException,java.io.IOException,java.net.SocketTimeoutException
resilience4j.retry.instances.claude.ignore-exceptions=com.ledgerlens.receipt.ClaudeNonRetryableException

# ── Resilience4j: Bulkhead (semaphore) ───────────────────────────────────────
# Max 5 concurrent Claude calls — protects thread pool from AI call saturation.
# Excess callers receive BulkheadFullException immediately (no wait).
resilience4j.bulkhead.instances.claude.max-concurrent-calls=5
resilience4j.bulkhead.instances.claude.max-wait-duration=0ms

# ── Global Claude rate limit ──────────────────────────────────────────────────
claude.global-rate-limit-per-minute=50

# ── IP rate limit ─────────────────────────────────────────────────────────────
rate-limit.ip.max-requests-per-minute=${RATE_LIMIT_IP_MAX_REQUESTS_PER_MINUTE:200}

# Outbox publisher throughput. Raise these for k6/load tests if RabbitMQ can keep up.
outbox.poller.fixed-delay-ms=${OUTBOX_POLLER_FIXED_DELAY_MS:250}
outbox.poller.batch-size=${OUTBOX_POLLER_BATCH_SIZE:100}

# ── DLQ retry ─────────────────────────────────────────────────────────────────
dlq.max-retries=4

# ── Resilience4j: Insights Circuit Breaker ────────────────────────────────────
resilience4j.circuitbreaker.instances.insights.register-health-indicator=true
resilience4j.circuitbreaker.instances.insights.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.insights.sliding-window-size=5
resilience4j.circuitbreaker.instances.insights.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.insights.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.insights.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.insights.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.insights.ignore-exceptions=com.ledgerlens.receipt.ClaudeNonRetryableException

# ── Resilience4j: Insights Retry ──────────────────────────────────────────────
resilience4j.retry.instances.insights.max-attempts=2
resilience4j.retry.instances.insights.wait-duration=2s
resilience4j.retry.instances.insights.retry-exceptions=com.ledgerlens.receipt.ClaudeTransientException,java.io.IOException,java.net.SocketTimeoutException
resilience4j.retry.instances.insights.ignore-exceptions=com.ledgerlens.receipt.ClaudeNonRetryableException

# ── Resilience4j: Insights Bulkhead ───────────────────────────────────────────
resilience4j.bulkhead.instances.insights.max-concurrent-calls=3
resilience4j.bulkhead.instances.insights.max-wait-duration=0ms

rate-limit.ip.max-requests-per-minute=100000
